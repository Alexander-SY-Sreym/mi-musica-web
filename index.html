<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EEMusic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #6366F1;
      --accent2: #8B5CF6;
      --cyan: #22D3EE;
      --bg: #070B14;
      --bg2: #0D1424;
      --surface: #111827;
      --surface2: #1A2235;
      --border: rgba(255,255,255,0.06);
      --text: #E2E8F0;
      --muted: #4B5563;
      --danger: #EF4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

    /* ── ECUALIZADOR FONDO ── */
    #eq-bg {
      position:fixed; bottom:0; left:0; right:0; height:220px;
      display:flex; align-items:flex-end; gap:3px; padding:0 0 0 0;
      pointer-events:none; z-index:0; opacity:0.18;
    }
    .eq-bar {
      flex:1; border-radius:3px 3px 0 0;
      background: linear-gradient(to top, #6366F1, #8B5CF6, #22D3EE);
      animation: eqAnim var(--dur, 1s) ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    @keyframes eqAnim {
      0%   { height: var(--h1); }
      100% { height: var(--h2); }
    }

    /* ── LOGIN ── */
    #login-screen {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; gap:32px; position:relative; z-index:1;
    }
    .logo-big { display:flex; align-items:center; gap:18px; }
    .logo-icon-big {
      width:72px; height:72px; border-radius:22px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 0 32px rgba(99,102,241,0.4);
      position:relative; overflow:hidden;
    }
    .logo-icon-big .initials {
      font-size:1.5rem; font-weight:800; color:#fff;
      letter-spacing:-1px; line-height:1; margin-bottom:4px;
    }
    .logo-icon-big .wink {
      font-size:0.75rem; color:rgba(255,255,255,0.7);
      letter-spacing:1px; font-weight:600;
    }
    .logo-texts .name {
      font-size:2.4rem; font-weight:800; letter-spacing:-1.5px; line-height:1;
      background:linear-gradient(135deg, #818CF8, #22D3EE);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .logo-texts .tagline { font-size:0.82rem; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
    .btn-google {
      background:#fff; color:#111; border:none; padding:15px 40px;
      border-radius:50px; font-size:1rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; gap:12px;
      box-shadow:0 4px 28px rgba(0,0,0,0.5); transition:transform 0.15s,box-shadow 0.15s;
    }
    .btn-google:hover { transform:translateY(-2px); box-shadow:0 8px 36px rgba(0,0,0,0.6); }

    /* ── APP ── */
    #app-screen { display:none; position:relative; z-index:1; }
    header {
      background:rgba(7,11,20,0.92); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:13px 28px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:20;
    }
    .header-brand { display:flex; align-items:center; gap:10px; }
    .logo-icon-sm {
      width:34px; height:34px; border-radius:10px;
      background:linear-gradient(135deg,#4F46E5,#7C3AED);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 0 12px rgba(99,102,241,0.35);
    }
    .logo-icon-sm .i { font-size:0.72rem; font-weight:800; color:#fff; letter-spacing:-0.5px; line-height:1.1; }
    .logo-icon-sm .w { font-size:0.45rem; color:rgba(255,255,255,0.65); letter-spacing:0.5px; }
    .brand-name { font-size:1.15rem; font-weight:800; letter-spacing:-0.5px;
      background:linear-gradient(135deg,#818CF8,#22D3EE);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .user-info { display:flex; align-items:center; gap:10px; }
    .user-info img { width:34px; height:34px; border-radius:50%; border:2px solid var(--accent); }
    .user-info span { font-size:0.82rem; color:var(--muted); }
    .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted);
      padding:6px 16px; border-radius:20px; cursor:pointer; font-size:0.78rem; transition:all 0.2s; }
    .btn-logout:hover { border-color:var(--accent); color:#818CF8; }

    main { max-width:860px; margin:0 auto; padding:28px 20px 110px; }

    /* ── UPLOAD ── */
    .upload-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:22px; margin-bottom:22px; position:relative; overflow:hidden;
    }
    .upload-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,var(--accent),var(--accent2),var(--cyan)); }
    .upload-card h2 { font-size:0.75rem; font-weight:600; color:var(--muted);
      text-transform:uppercase; letter-spacing:2px; margin-bottom:16px; }
    .upload-controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .file-label {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; border:none; padding:10px 20px; border-radius:12px;
      font-size:0.86rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; gap:8px; transition:opacity 0.2s;
      box-shadow:0 4px 14px rgba(99,102,241,0.35);
    }
    .file-label:hover { opacity:0.85; }
    #file-input { display:none; }
    .select-styled { background:var(--surface2); color:var(--text); border:1px solid var(--border);
      padding:10px 14px; border-radius:12px; font-size:0.86rem; min-width:150px; outline:none; cursor:pointer; }
    .input-styled { background:var(--surface2); color:var(--text); border:1px solid var(--border);
      padding:10px 14px; border-radius:12px; font-size:0.86rem; width:155px; outline:none; }
    .input-styled::placeholder { color:var(--muted); }
    .input-styled:focus { border-color:var(--accent); }
    .btn-secondary { background:var(--surface2); color:#818CF8; border:1px solid var(--border);
      padding:10px 16px; border-radius:12px; font-size:0.86rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .btn-secondary:hover { border-color:var(--accent); background:rgba(99,102,241,0.1); }
    .btn-upload { background:linear-gradient(135deg,var(--accent),var(--cyan)); color:#fff; border:none;
      padding:10px 22px; border-radius:12px; font-size:0.86rem; font-weight:700; cursor:pointer;
      transition:opacity 0.2s; box-shadow:0 4px 14px rgba(34,211,238,0.25); }
    .btn-upload:hover { opacity:0.85; }
    .btn-upload:disabled { opacity:0.3; cursor:not-allowed; }
    #progress-bar-container { display:none; margin-top:16px; }
    #progress-text { font-size:0.78rem; color:var(--muted); margin-bottom:8px; }
    #progress-bar { width:100%; height:4px; background:var(--surface2); border-radius:4px; overflow:hidden; }
    #progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--cyan));
      border-radius:4px; width:0%; transition:width 0.3s; }

    /* ── SEARCH ── */
    .search-wrap { position:relative; margin-bottom:16px; }
    .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.9rem; }
    .search-bar { background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:12px 20px 12px 44px; border-radius:14px; width:100%; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
    .search-bar:focus { border-color:var(--accent); }
    .search-bar::placeholder { color:var(--muted); }

    /* ── TABS ── */
    .folder-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
    .folder-tab { background:var(--surface); color:var(--muted); border:1px solid var(--border);
      padding:7px 18px; border-radius:20px; cursor:pointer; font-size:0.81rem; font-weight:500; transition:all 0.2s; }
    .folder-tab:hover { border-color:#818CF8; color:#818CF8; }
    .folder-tab.active { background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; border-color:transparent; font-weight:700;
      box-shadow:0 4px 14px rgba(99,102,241,0.3); }

    /* ── SONGS ── */
    #songs-list { display:flex; flex-direction:column; gap:6px; }
    .song-item { background:var(--surface); border:1px solid var(--border); border-radius:16px;
      padding:14px 18px; display:flex; align-items:center; gap:14px; transition:all 0.2s; }
    .song-item:hover { background:var(--surface2); border-color:rgba(99,102,241,0.3); }
    .song-item.playing { background:rgba(99,102,241,0.08); border-color:rgba(99,102,241,0.45);
      box-shadow:0 0 20px rgba(99,102,241,0.1); }
    .btn-play { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:#fff;
      cursor:pointer; width:40px; height:40px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:0.85rem;
      box-shadow:0 4px 14px rgba(99,102,241,0.4); transition:transform 0.15s,box-shadow 0.15s; }
    .btn-play:hover { transform:scale(1.1); box-shadow:0 6px 20px rgba(99,102,241,0.6); }
    .song-info { flex:1; min-width:0; }
    .song-name { font-size:0.92rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .song-folder { font-size:0.74rem; color:var(--muted); margin-top:3px; }
    .song-date { font-size:0.71rem; color:var(--muted); white-space:nowrap; }
    .song-actions { display:flex; gap:6px; align-items:center; }

    /* Mini ecualizador animado junto a canción activa */
    .mini-eq { display:none; align-items:flex-end; gap:2px; height:18px; margin-left:4px; }
    .song-item.playing .mini-eq { display:flex; }
    .meq { width:3px; border-radius:2px; background:linear-gradient(to top,var(--accent),var(--cyan));
      animation:meqA var(--d,0.7s) ease-in-out infinite alternate; }
    @keyframes meqA { 0%{height:4px} 100%{height:var(--mh,14px)} }

    .btn-dl { background:transparent; border:1px solid var(--border); color:#818CF8;
      cursor:pointer; width:34px; height:34px; border-radius:10px;
      display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .btn-dl:hover { border-color:var(--accent); background:rgba(99,102,241,0.1); }
    .btn-del { background:transparent; border:1px solid var(--border); color:var(--muted);
      cursor:pointer; width:34px; height:34px; border-radius:10px;
      display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .btn-del:hover { border-color:var(--danger); color:var(--danger); background:rgba(239,68,68,0.08); }

    /* ── EMPTY ── */
    .empty-state { text-align:center; padding:64px 0; color:var(--muted); }
    .empty-icon { font-size:2.8rem; opacity:0.3; margin-bottom:12px; }

    /* ── PLAYER ── */
    #player-bar {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(7,11,20,0.97); backdrop-filter:blur(18px);
      border-top:1px solid rgba(99,102,241,0.25);
      padding:12px 28px; display:none; align-items:center; gap:16px; z-index:50;
    }
    #player-bar::before { content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),var(--cyan),transparent); }
    #player-bar.active { display:flex; }
    .player-thumb { width:42px; height:42px; border-radius:10px; flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:1.1rem;
      box-shadow:0 4px 14px rgba(99,102,241,0.4); }
    /* Micro ecualizador en player */
    .player-eq { display:flex; align-items:flex-end; gap:2px; height:20px; flex-shrink:0; }
    .peq { width:3px; border-radius:2px; background:linear-gradient(to top,var(--accent),var(--cyan));
      animation:meqA var(--d,0.6s) ease-in-out infinite alternate; }
    #player-song-name { font-size:0.87rem; font-weight:700; color:#A5B4FC;
      width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
    #player-audio { flex:1; min-width:0; accent-color:var(--accent); }
    #player-close { background:transparent; border:none; color:var(--muted); cursor:pointer;
      font-size:1.3rem; transition:color 0.2s; }
    #player-close:hover { color:var(--text); }

    /* ── TOAST ── */
    .toast { position:fixed; bottom:82px; right:24px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; padding:12px 20px; border-radius:12px; font-weight:700; font-size:0.85rem;
      opacity:0; transform:translateY(8px); transition:all 0.3s; z-index:100;
      box-shadow:0 8px 24px rgba(99,102,241,0.5); }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.error { background:var(--danger); box-shadow:0 8px 24px rgba(239,68,68,0.4); }
  </style>
</head>
<body>

<!-- ECUALIZADOR FONDO -->
<div id="eq-bg"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo-big">
    <div class="logo-icon-big">
      <div class="initials">EE</div>
      <div class="wink">;D</div>
    </div>
    <div class="logo-texts">
      <div class="name">EEMusic</div>
      <div class="tagline">Tu música en la nube</div>
    </div>
  </div>
  <button class="btn-google" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continuar con Google
  </button>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="header-brand">
      <div class="logo-icon-sm">
        <div class="i">EE</div>
        <div class="w">;D</div>
      </div>
      <span class="brand-name">EEMusic</span>
    </div>
    <div class="user-info">
      <img id="user-photo" src="" alt="">
      <span id="user-name"></span>
      <button class="btn-logout" onclick="signOut()">Salir</button>
    </div>
  </header>

  <main>
    <div class="upload-card">
      <h2>Subir canciones</h2>
      <div class="upload-controls">
        <label class="file-label" for="file-input">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Seleccionar MP3
        </label>
        <input type="file" id="file-input" accept=".mp3,.m4a,.flac,.wav" multiple>
        <select id="folder-select" class="select-styled"><option value="General">📁 General</option></select>
        <input type="text" id="new-folder-input" class="input-styled" placeholder="Nueva carpeta...">
        <button class="btn-secondary" onclick="createFolder()">+ Crear</button>
        <button class="btn-upload" id="upload-btn" onclick="uploadFiles()" disabled>↑ Subir</button>
      </div>
      <div id="progress-bar-container">
        <div id="progress-text">Subiendo...</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-bar" placeholder="Buscar canciones..." oninput="filterSongs(this.value)">
    </div>
    <div class="folder-tabs" id="folder-tabs">
      <button class="folder-tab active" onclick="filterByFolder('todas', this)">Todas</button>
    </div>
    <div id="songs-list"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<div id="player-bar">
  <div class="player-thumb">🎵</div>
  <div class="player-eq">
    <div class="peq" style="--d:0.55s;--mh:18px"></div>
    <div class="peq" style="--d:0.4s;--mh:14px"></div>
    <div class="peq" style="--d:0.7s;--mh:20px"></div>
    <div class="peq" style="--d:0.5s;--mh:12px"></div>
    <div class="peq" style="--d:0.65s;--mh:16px"></div>
  </div>
  <span id="player-song-name">—</span>
  <audio id="player-audio" controls></audio>
  <button id="player-close" onclick="closePlayer()">✕</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // ── Ecualizador de fondo ──
  const eqBg = document.getElementById('eq-bg');
  const N = 60;
  for (let i = 0; i < N; i++) {
    const bar = document.createElement('div');
    bar.className = 'eq-bar';
    const h1 = Math.random()*40+10;
    const h2 = Math.random()*160+20;
    const dur = (Math.random()*0.8+0.4).toFixed(2);
    bar.style.cssText = `--h1:${h1}px;--h2:${h2}px;--dur:${dur}s;animation-delay:${(Math.random()*0.8).toFixed(2)}s`;
    eqBg.appendChild(bar);
  }

  // ── Firebase ──
  const firebaseConfig = {
    apiKey: "AIzaSyBoFllNibVJcVE4HecD-0VHCERyxzojQTo",
    authDomain: "mi-musica-ale.firebaseapp.com",
    projectId: "mi-musica-ale",
    storageBucket: "mi-musica-ale.firebasestorage.app",
    messagingSenderId: "132593116859",
    appId: "1:132593116859:web:5e3dc68394225478542b9e"
  };
  const CLOUDINARY_CLOUD = 'dwzyrfqa8';
  const CLOUDINARY_PRESET = 'musica_preset';

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser=null, allSongs=[], selectedFolder='todas', searchQuery='', currentPlayingId=null;

  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      document.getElementById('user-photo').src = user.photoURL||'';
      document.getElementById('user-name').textContent = user.displayName||user.email;
      loadSongs();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  function signInWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  function signOut() { auth.signOut(); }

  document.getElementById('file-input').addEventListener('change', function() {
    document.getElementById('upload-btn').disabled = this.files.length===0;
  });

  async function uploadFiles() {
    const files = document.getElementById('file-input').files;
    const folder = document.getElementById('folder-select').value;
    if (!files.length) return;
    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    document.getElementById('progress-bar-container').style.display = 'block';
    let uploaded = 0;
    for (const file of files) {
      document.getElementById('progress-text').textContent = `Subiendo ${file.name} (${uploaded+1}/${files.length})...`;
      document.getElementById('progress-fill').style.width = `${(uploaded/files.length)*100}%`;
      try {
        const fd = new FormData();
        fd.append('file',file); fd.append('upload_preset',CLOUDINARY_PRESET);
        fd.append('resource_type','raw'); fd.append('folder','musica');
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/raw/upload`,{method:'POST',body:fd});
        const data = await res.json();
        if (data.secure_url) {
          await db.collection('usuarios').doc(currentUser.uid).collection('canciones').add({
            nombre: file.name.replace(/\.(mp3|m4a|flac|wav)$/i,''),
            url: data.secure_url, publicId: data.public_id,
            carpeta: folder, fechaSubida: firebase.firestore.Timestamp.now()
          });
          uploaded++;
        } else { showToast('Error: '+(data.error?.message||''), true); }
      } catch(e) { showToast('Error: '+e.message, true); }
    }
    document.getElementById('progress-fill').style.width='100%';
    document.getElementById('progress-text').textContent='¡Listo!';
    setTimeout(()=>{ document.getElementById('progress-bar-container').style.display='none';
      document.getElementById('progress-fill').style.width='0%'; },2000);
    btn.disabled=false;
    document.getElementById('file-input').value='';
    showToast(`✓ ${uploaded} canción(es) subida(s)`);
  }

  function createFolder() {
    const name = document.getElementById('new-folder-input').value.trim();
    if (!name) return;
    addFolderOption(name);
    document.getElementById('folder-select').value=name;
    document.getElementById('new-folder-input').value='';
    showToast(`Carpeta "${name}" creada`);
  }

  function addFolderOption(name) {
    const sel = document.getElementById('folder-select');
    if ([...sel.options].some(o=>o.value===name)) return;
    const opt=document.createElement('option'); opt.value=name; opt.textContent='📁 '+name; sel.appendChild(opt);
    const tabs=document.getElementById('folder-tabs');
    if (!tabs.querySelector(`[data-folder="${name}"]`)) {
      const b=document.createElement('button'); b.className='folder-tab'; b.textContent=name; b.dataset.folder=name;
      b.onclick=()=>filterByFolder(name,b); tabs.appendChild(b);
    }
  }

  function loadSongs() {
    db.collection('usuarios').doc(currentUser.uid).collection('canciones')
      .orderBy('fechaSubida','desc').onSnapshot(snap=>{
        allSongs=snap.docs.map(d=>({id:d.id,...d.data()}));
        [...new Set(allSongs.map(s=>s.carpeta||'General'))].forEach(addFolderOption);
        renderSongs();
      });
  }

  function renderSongs() {
    let songs=allSongs;
    if (selectedFolder!=='todas') songs=songs.filter(s=>(s.carpeta||'General')===selectedFolder);
    if (searchQuery) songs=songs.filter(s=>s.nombre.toLowerCase().includes(searchQuery));
    const list=document.getElementById('songs-list');
    if (!songs.length) {
      list.innerHTML=`<div class="empty-state"><div class="empty-icon">🎵</div><p>No hay canciones aquí aún</p></div>`;
      return;
    }
    const heights=['10px','16px','12px','18px','8px','14px'];
    const durs=['0.5s','0.7s','0.4s','0.65s','0.55s','0.45s'];
    list.innerHTML=songs.map(song=>`
      <div class="song-item ${currentPlayingId===song.id?'playing':''}" id="item-${song.id}">
        <button class="btn-play" onclick="playSong('${song.url}','${song.nombre.replace(/'/g,"\\'")}','${song.id}')">
          ${currentPlayingId===song.id?'⏸':'▶'}
        </button>
        <div class="song-info">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="song-name">${song.nombre}</div>
            <div class="mini-eq">
              ${heights.map((h,i)=>`<div class="meq" style="--d:${durs[i]};--mh:${h}"></div>`).join('')}
            </div>
          </div>
          <div class="song-folder">📁 ${song.carpeta||'General'}</div>
        </div>
        <div class="song-date">${formatDate(song.fechaSubida)}</div>
        <div class="song-actions">
          <button class="btn-dl" title="Descargar" onclick="downloadSong('${song.url}','${song.nombre.replace(/'/g,"\\'")}')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="btn-del" title="Eliminar" onclick="deleteSong('${song.id}','${song.nombre.replace(/'/g,"\\'")}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </div>`).join('');
  }

  function filterByFolder(folder,btn) {
    selectedFolder=folder;
    document.querySelectorAll('.folder-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active'); renderSongs();
  }
  function filterSongs(q) { searchQuery=q.toLowerCase(); renderSongs(); }

  async function deleteSong(id,nombre) {
    if (!confirm(`¿Eliminar "${nombre}"?`)) return;
    await db.collection('usuarios').doc(currentUser.uid).collection('canciones').doc(id).delete();
    if (currentPlayingId===id) closePlayer();
    showToast(`"${nombre}" eliminada`);
  }

  async function downloadSong(url,nombre) {
    showToast('Descargando...');
    try {
      const res=await fetch(url); const blob=await res.blob();
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download=nombre+'.mp3'; a.click(); URL.revokeObjectURL(a.href);
    } catch(e) { window.open(url,'_blank'); }
  }

  function playSong(url,nombre,id) {
    const audio=document.getElementById('player-audio');
    if (currentPlayingId===id) { audio.paused?audio.play():audio.pause(); return; }
    currentPlayingId=id;
    document.getElementById('player-song-name').textContent=nombre;
    audio.src=url; audio.play();
    document.getElementById('player-bar').classList.add('active');
    renderSongs();
  }

  function closePlayer() {
    const audio=document.getElementById('player-audio');
    audio.pause(); audio.src=''; currentPlayingId=null;
    document.getElementById('player-bar').classList.remove('active');
    renderSongs();
  }

  function formatDate(ts) {
    if (!ts) return '';
    const d=ts.toDate?ts.toDate():new Date(ts);
    return d.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  }

  function showToast(msg,isError=false) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast show'+(isError?' error':'');
    setTimeout(()=>t.className='toast',3000);
  }
</script>
</body>
</html>
